name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package mod
        run: |
          MOD_NAME="CrusherPlus"
          if [[ "$GITHUB_REF_NAME" =~ ^v ]]; then
            ZIP_NAME="${MOD_NAME}-${GITHUB_REF_NAME#v}.zip"
          else
            ZIP_NAME="${MOD_NAME}-dev-${GITHUB_SHA::7}.zip"
          fi
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          cd "${MOD_NAME}"
          zip -r "../${ZIP_NAME}" ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

      # Push to main → 持续更新 Dev Build release
      - name: Dev Release (continuous)
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Dev Build
          commit: ${{ github.sha }}
          artifacts: ${{ env.ZIP_NAME }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
          body: "自动构建 #${{ github.run_number }}"

      # Tag 推送 → 创建版本 Release
      - name: Version Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true